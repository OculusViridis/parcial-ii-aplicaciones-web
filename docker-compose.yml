version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: db_parcial_web
    restart: always
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: superpassword123
      POSTGRES_DB: bd_usuarios
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: